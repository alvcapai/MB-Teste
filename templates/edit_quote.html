{% extends "base.html" %}
{% block content %}
<div class="card mx-auto" style="max-width: 500px;">
  <div class="card-body">
    <h2 class="card-title mb-4">Editar Cotação #{{ quote.id }}</h2>
    <form method="post">
      <div class="mb-3">
        <label for="plate" class="form-label">Placa do carro</label>
        <input type="text" class="form-control" id="plate" name="plate" value="{{ quote.plate }}" required>
      </div>
      <div class="mb-3">
        <label for="model" class="form-label">Modelo do carro</label>
        <input type="text" class="form-control" id="model" name="model" value="{{ quote.model }}" required>
      </div>
      <div class="mb-3">
        <label for="labor_cost" class="form-label">Custo da mão de obra (R$)</label>
        <input type="number" step="0.01" class="form-control" id="labor_cost" name="labor_cost" value="{{ '%.2f' % quote.labor_cost }}" required>
      </div>
      <button type="submit" class="btn btn-primary">Salvar alterações</button>
      <a href="{{ url_for('view_quote', quote_id=quote.id) }}" class="btn btn-secondary ms-2">Cancelar</a>
    </form>
  </div>
</div>
{% endblock %}
