{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h1 class="mb-0">Cotações</h1>
  <a href="{{ url_for('new_quote') }}" class="btn btn-primary">Nova Cotação</a>
</div>

{% if quotes %}
  <div class="row row-cols-1 row-cols-md-2 g-4">
  {% for q in quotes %}
    <div class="col">
      <div class="card">
        <div class="card-body">
          <h5 class="card-title">{{ q.model }} ({{ q.plate }})</h5>
          <p class="card-text">ID: {{ q.id }}</p>
          <p class="card-text">Mão de obra: R$ {{ '%.2f' % q.labor_cost }}</p>
          <a href="{{ url_for('view_quote', quote_id=q.id) }}" class="btn btn-primary">Ver detalhes</a>
        </div>
      </div>
    </div>
  {% endfor %}
  </div>
{% else %}
  <p>Nenhuma cotação ainda.</p>
{% endif %}

{% endblock %}
